<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendrier éditorial Instagram — Teck Aménagement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFBFD; --panel:#ffffff; --card:#fff; --ink:#1d1d1f; --muted:#6e6e73;
    --line:#e6e9ef; --fog:#F2F5FA;
    --blue:#0653A8; --blue-d:#004694; --blue-l:#7AADDE; --blue-xl:#D2E5F5;
    --wood:#0653A8; --wood-d:#004694;
    --green:#2f7d4f; --amber:#E8A33D; --grey:#9aa2b1; --red:#c0392b;
    --shadow:0 1px 3px rgba(6,83,168,.07), 0 10px 28px -18px rgba(6,83,168,.4), 0 0 0 1px rgba(20,30,50,.05);
    --sh-sm:0 1px 2px rgba(6,83,168,.06), 0 0 0 1px rgba(20,30,50,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);
    background-color:var(--bg);
    background-image:radial-gradient(rgba(6,83,168,.06) 1px, transparent 1px);
    background-size:22px 22px;
    font:15px/1.5 "Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  header{padding:26px clamp(16px,4vw,40px) 10px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--wood),var(--wood-d));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;box-shadow:var(--shadow)}
  h1,.modal h2,.calhead .m{font-family:"Montserrat","Inter",sans-serif}
  h1{font-size:20px;margin:0;font-weight:700;letter-spacing:-.01em}
  .topbaraccent{color:var(--blue)}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .wrap{padding:0 clamp(16px,4vw,40px) 60px;max-width:1240px;margin:0 auto}

  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:18px 0 20px}
  .stats{display:flex;gap:8px;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;box-shadow:var(--shadow)}
  .stat b{font-size:16px}
  .spacer{flex:1}
  .views{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
  .views button{border:0;background:transparent;padding:9px 16px;font:inherit;font-weight:600;color:var(--muted);cursor:pointer}
  .views button.on{background:var(--blue);color:#fff}

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .chip{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:6px 13px;font-size:13px;cursor:pointer;color:var(--muted);font-weight:600}
  .chip.on{color:#fff;background:var(--blue);border-color:var(--blue)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}

  /* BOARD */
  /* align-items:start — les stories sont en 9:16 et les posts en 4:5, sans ça les
     cartes courtes s'étirent à la hauteur de la plus grande et laissent un vide. */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;align-items:start}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
  /* Aucune vignette n'est recadrée : chaque visuel garde ses vraies proportions
     (post 4:5, story 9:16…), pour que le client voie exactement ce qui sortira. */
  .thumb{background:#e9eff7;position:relative;cursor:pointer;line-height:0}
  .thumb img{width:100%;height:auto;display:block}
  .thumb.ph{aspect-ratio:4/5;line-height:1.5;display:flex;align-items:center;justify-content:center;color:#9aa2b1;font-size:13px;text-align:center;padding:16px;flex-direction:column;gap:6px}
  .num{position:absolute;top:10px;left:10px;background:rgba(6,83,168,.9);color:#fff;font-size:12px;font-weight:700;border-radius:8px;padding:3px 8px;backdrop-filter:blur(4px)}
  .pill{position:absolute;top:10px;right:10px;font-size:11px;font-weight:700;border-radius:999px;padding:4px 10px;color:#fff}
  .cbody{padding:14px 15px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
  .angle{font-weight:650;font-size:14.5px;line-height:1.35}
  .meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:var(--muted)}
  .cc{font-weight:700}
  .cc.bad{color:var(--red)}
  .cap{white-space:pre-wrap;font-size:12.5px;color:#44474f;background:var(--fog);border:1px solid var(--line);border-radius:10px;padding:10px;max-height:112px;overflow:auto}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:auto}
  select,input[type=date]{font:inherit;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;background:#fff;color:var(--ink)}
  .btn{border:0;border-radius:8px;padding:8px 12px;font:inherit;font-weight:650;font-size:12.5px;cursor:pointer}
  .btn.p{background:var(--blue);color:#fff}
  .btn.g{background:var(--fog);color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  .warn{background:#fff6e9;border:1px solid #f3dcb0;border-left:4px solid var(--amber);color:#a9701f;border-radius:10px;padding:8px 10px;font-size:12px}

  /* CALENDAR */
  .calhead{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .calhead button{border:1px solid var(--line);background:var(--panel);border-radius:9px;width:36px;height:36px;font-size:17px;cursor:pointer;box-shadow:var(--shadow)}
  .calhead .m{font-weight:700;font-size:17px;min-width:180px;text-align:center;text-transform:capitalize}
  .tray{background:var(--panel);border:1px dashed var(--wood);border-radius:14px;padding:12px;margin-bottom:16px}
  .tray h3{margin:0 0 10px;font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .tray .items{display:flex;gap:8px;flex-wrap:wrap;min-height:10px}
  .tchip{display:flex;align-items:center;gap:8px;background:var(--fog);border:1px solid var(--line);border-radius:10px;padding:5px 10px 5px 6px;cursor:grab;font-size:12.5px;font-weight:600}
  .tchip img,.ev img{width:26px;height:26px;object-fit:cover;border-radius:6px;flex:none}
  .tchip .ph2,.ev .ph2{width:26px;height:26px;border-radius:6px;background:#dbe4f2;flex:none}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .dow{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;text-align:center;padding-bottom:2px}
  .day{background:var(--panel);border:1px solid var(--line);border-radius:11px;min-height:110px;padding:6px;display:flex;flex-direction:column;gap:5px}
  .day.out{background:#eef1f6;opacity:.5}
  .day.today{border-color:var(--blue);box-shadow:0 0 0 2px rgba(6,83,168,.18)}
  .day.drop{border-color:var(--blue);background:var(--blue-xl)}
  .dn{font-size:12px;color:var(--muted);font-weight:700}
  .ev{display:flex;align-items:center;gap:6px;background:var(--fog);border:1px solid var(--line);border-radius:8px;padding:3px 5px;font-size:11.5px;font-weight:600;cursor:grab}
  .ev .x{margin-left:auto;color:var(--muted);cursor:pointer;font-weight:700}
  .evtxt{display:flex;flex-direction:column;gap:2px;min-width:0}
  .fmt{display:inline-block;color:#fff;font-size:9.5px;font-weight:800;letter-spacing:.05em;border-radius:5px;padding:1px 5px;width:fit-content}
  .tchip .evtxt{flex-direction:row;align-items:center;gap:6px}

  /* MODAL */
  .ov{position:fixed;inset:0;background:rgba(30,25,18,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .ov.on{display:flex}
  .modal{background:var(--panel);border-radius:18px;max-width:900px;width:100%;max-height:90vh;overflow:auto;display:grid;grid-template-columns:1fr 1fr;box-shadow:0 30px 80px rgba(0,0,0,.35)}
  .modal .ph3{background:#e9eff7 center/cover no-repeat;min-height:360px}
  .modal .side{padding:22px}
  .modal h2{margin:0 0 4px;font-size:17px}
  .modal .cap2{white-space:pre-wrap;font-size:13px;background:var(--fog);border:1px solid var(--line);border-radius:10px;padding:12px;margin:12px 0}
  .close{position:absolute;top:16px;right:18px;background:#fff;border:1px solid var(--line);border-radius:50%;width:34px;height:34px;font-size:16px;cursor:pointer;z-index:2}
  @media(max-width:720px){.modal{grid-template-columns:1fr}.modal .ph3{min-height:220px}}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13.5px;opacity:0;transition:.25s;z-index:60}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .hidden{display:none!important}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">T</div>
    <div>
      <h1>Calendrier éditorial Instagram</h1>
      <div class="sub">Teck Aménagement · 8 posts photo · 5 reels · 14 stories · glisse-dépose pour planifier, clique une carte pour la voir en grand</div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="bar">
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <div class="views">
      <button id="vBoard" class="on" onclick="setView('board')">Posts</button>
      <button id="vCal" onclick="setView('cal')">Calendrier</button>
    </div>
  </div>

  <div id="board">
    <div class="chips" id="chips"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div id="cal" class="hidden">
    <div class="tray">
      <h3>À planifier — glisse un contenu sur une date</h3>
      <div class="items" id="tray"></div>
    </div>
    <div class="calhead">
      <button onclick="moveMonth(-1)">‹</button>
      <div class="m" id="monthLabel"></div>
      <button onclick="moveMonth(1)">›</button>
    </div>
    <div class="cal" id="calGrid"></div>
  </div>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="position:relative">
    <button class="close" onclick="closeModal()">✕</button>
    <div class="ph3" id="mImg"></div>
    <div class="side">
      <h2 id="mAngle"></h2>
      <div class="meta" id="mMeta"></div>
      <div class="cap2" id="mCap"></div>
      <div class="row">
        <button class="btn p" id="mCopy">Copier la légende</button>
        <span class="meta" id="mCC"></span>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

const SIG = "Teck Aménagement... Une nouvelle gamme de pergolas pour sublimer votre extérieur 🖊️";

// Chaque contenu porte un `type` : post photo (mardi), reel (vendredi), story (lundi + jeudi).

const POSTS = [
  { id:"p2", type:"post", num:1, img:"assets/02-daybed-bois-exotique.jpg", angle:"Daybed · Bois exotique sans entretien",
    status:"planifie", date:"2026-07-10", heure:"19h00",
    cap:`Et si vous n'aviez plus jamais besoin d'entretenir votre bois chez vous ?

${CREDIT}

#TeckAménagement #BoisExotique #SansEntretien #TerrasseBois #Provence` },

  { id:"p3", type:"post", num:3, img:"assets/03-pergola-chaleur.jpg", angle:"Pergola · Confort et fraîcheur",
    status:"planifie", date:"2026-07-21", heure:"18h00",
    cap:`Sous cette pergola, la chaleur de l'été n'entre pas.

La densité du bois filtre le soleil quand la structure aérée laisse l'air circuler librement.

La brise d'été traverse l'espace et rafraîchit naturellement.

${SIG}

${CREDIT}

  { id:"p4", type:"post", num:2, img:"assets/_LVM1735.jpg", angle:"Déjeuner à l'ombre en famille",
    status:"planifie", date:"2026-07-14", heure:"18h00",
    cap:`À midi, la table est mise à l'ombre et le déjeuner peut durer.

${SIG}

${CREDIT_M}

#TeckAménagement #PergolaSurMesure #ArtDeRecevoir #TerrasseOmbragée #Provence` },

  { id:"p5", type:"post", num:7, img:"assets/_LVM1690.jpg", angle:"Coin d'ombre au bord de la piscine",
    status:"planifie", date:"2026-08-18", heure:"18h00",
    cap:`Après la baignade, l'ombre vous attend à deux pas de l'eau.

Juste à côté de la piscine, la pergola crée un coin frais où l'on se pose sans quitter le bord.

Le temps d'un goûter pour les enfants ou d'un jus de fruit à l'ombre, l'été devient plus doux.

${SIG}

${CREDIT_M}

#TeckAménagement #PergolaSurMesure #Piscine #ConfortExtérieur #Provence` },

  { id:"p6", type:"post", num:4, img:"assets/_LVM1674.jpg", angle:"S'intègre à toute maison",
    status:"planifie", date:"2026-07-28", heure:"18h00",
    cap:`Peur qu'une pergola dénature votre maison ? C'est tout l'inverse.

Quel que soit le style de votre façade, nous la dessinons pour épouser votre architecture.

${SIG}

${CREDIT}

#TeckAménagement #PergolaSurMesure #ArchitectureExtérieure #AménagementExtérieur #Provence` },

  { id:"p7", type:"post", num:6, img:"assets/07-kar-villa-artdeco.jpg", angle:"Personnalisation / sur-mesure",
    status:"planifie", date:"2026-08-11", heure:"18h00",
    cap:`Aucune de nos pergolas ne ressemble à une autre.

${SIG}

${CREDIT}

${SIG}

${CREDIT}

#TeckAménagement #Claustra #BriseVue #BoisExotique #Provence` },

    status:"planifie", date:"2026-08-25", heure:"18h00",
    warn:"",
    cap:`Et si c'était vous, allongé sur votre transat, le regard levé vers le bois de votre pergola ?

Adrienne Riera, Nîmes

${SIG}

${CREDIT_M}

#TeckAménagement #PergolaBois #BoisExotique #Provence #ArtDeVivre` },

  /* ---------- REELS · un par vendredi, 19h00 · scripts complets dans scripts-reels.md ---------- */

  { id:"r7", type:"reel", num:7, img:"", phLabel:"🎬 À tourner", angle:"Une pergola, ça va assombrir ma maison ?",

  { id:"r6", type:"reel", num:6, img:"", phLabel:"🎬 À tourner · Franck face caméra", angle:"N'installez pas de pergola avant d'avoir entendu ça",

  { id:"r2", type:"reel", num:2, img:"", phLabel:"🎬 Motion design à produire", angle:"Visitez votre pergola avant qu'elle existe (motion design)",
    status:"aproduire", date:"2026-08-14", heure:"19h00",
    cap:`Peur prospect : « Et si je regrettais ? Comment être sûr que le résultat me plaira ? »

const STATUS = {
  apublier:{label:"À publier", color:"var(--green)"},
  planifie:{label:"Planifié", color:"var(--blue)"},
  publie:{label:"Publié", color:"var(--grey)"},
  atrancher:{label:"À trancher", color:"var(--amber)"},
  aproduire:{label:"À produire", color:"#7c5cbf"},
};

const KEY="teck_ig_cal_v4";
let state = JSON.parse(localStorage.getItem(KEY) || "{}");
POSTS.forEach(p=>{ if(!state[p.id]) state[p.id]={status:p.status, date:p.date||"", heure:p.heure||""}; });
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function st(p){ return state[p.id]; }

function bodyLen(cap){
  const lines = cap.split("\n");
  let i = lines.findIndex(l=>l.startsWith("Teck Aménagement"));
  if(i<0) i = lines.length;
  return lines.slice(0,i).join("\n").trim().length;
}
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("on"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),1600); }
function copy(text){ navigator.clipboard.writeText(text).then(()=>toast("Légende copiée ✓")).catch(()=>toast("Copie impossible")); }
function bg(p){ return p.img ? `background-image:url('${p.img}')` : ""; }

let filter="all";      // filtre par statut
let tFilter="all";     // filtre par format (post / reel / story)
function shown(){ return POSTS.filter(p=>(tFilter==="all"||p.type===tFilter) && (filter==="all"||st(p).status===filter)); }
function renderStats(){
  const c={apublier:0,planifie:0,publie:0,atrancher:0,aproduire:0};
  const t={post:0,reel:0,story:0};
  POSTS.forEach(p=>{ c[st(p).status]++; t[p.type]++; });
  setH(document.getElementById("stats"),
    Object.keys(TYPES).map(k=>`<div class="stat">${TYPES[k].icon} ${TYPES[k].label} <b>${t[k]}</b></div>`).join("")+
    Object.keys(STATUS).map(k=>`<div class="stat"><span class="dot" style="background:${STATUS[k].color}"></span>${STATUS[k].label} <b>${c[k]}</b></div>`).join(""));
}
function renderChips(){
  const types=[["all","Tous les formats"],...Object.keys(TYPES).map(k=>[k,TYPES[k].icon+" "+TYPES[k].label])];
  const opts=[["all","Tous les statuts"],...Object.keys(STATUS).map(k=>[k,STATUS[k].label])];
  setH(document.getElementById("chips"),
    types.map(([k,l])=>`<div class="chip ${tFilter===k?'on':''}" onclick="tFilter='${k}';renderBoard()">${l}</div>`).join("")+
    `<span style="width:14px"></span>`+
    opts.map(([k,l])=>{
      const dot = k==="all"?"":`<span class="dot" style="background:${STATUS[k].color}"></span>`;
      return `<div class="chip ${filter===k?'on':''}" onclick="filter='${k}';renderBoard()">${dot}${l}</div>`;
    }).join(""));
}
function renderBoard(){
  renderChips();
  const g=document.getElementById("grid"); g.textContent="";
  shown().sort((a,b)=>(st(a).date||"9999-99-99").localeCompare(st(b).date||"9999-99-99")).forEach(p=>{
    const s=st(p), stt=STATUS[s.status], ty=TYPES[p.type];
    const bl=bodyLen(p.cap), bad=bl<150||bl>400;
    const tag = `<span class="num" style="background:${ty.color}">${ty.icon} ${ty.short} #${p.num}</span>`;
    const thumb = p.img
      ? `<div class="thumb" onclick="openModal('${p.id}')"><img src="${p.img}" alt="">${tag}<span class="pill" style="background:${stt.color}">${stt.label}</span></div>`
      : `<div class="thumb ph" onclick="openModal('${p.id}')">${tag}<span class="pill" style="background:${stt.color}">${stt.label}</span><span>${p.phLabel||'🖼️ Photo à lier'}</span></div>`;
    const warn = p.warn?`<div class="warn">⚠️ ${esc(p.warn)}</div>`:"";
    // Le calibrage 150-400 caractères ne concerne que les légendes de posts photo.
    const count = p.type==="post"
      ? `<span class="cc ${bad?'bad':''}">${bl} car.</span><span>·</span><span>${bad?'hors 150-400':'ok'}</span>`
      : `<span class="cc" style="color:${ty.color}">${ty.label}</span><span>·</span><span>${s.date||"non planifié"}${s.heure?" · "+s.heure:""}</span>`;
    const div=document.createElement("div"); div.className="card";
    setH(div, thumb + `<div class="cbody">
      <div class="angle">${esc(p.angle)}</div>
      <div class="meta">${count}</div>
      ${warn}
      <div class="cap">${esc(p.cap)}</div>
      <div class="row">
        <select onchange="setStatus('${p.id}',this.value)">
          ${Object.keys(STATUS).map(k=>`<option value="${k}" ${s.status===k?'selected':''}>${STATUS[k].label}</option>`).join("")}
        </select>
        <input type="date" value="${s.date}" onchange="setDate('${p.id}',this.value)">
        <input type="text" value="${s.heure||''}" placeholder="heure" style="width:60px;text-align:center" onchange="setHeure('${p.id}',this.value)">
        <button class="btn g" onclick="copy(POSTS.find(x=>x.id==='${p.id}').cap)">Copier</button>
      </div>
    </div>`);
    g.appendChild(div);
  });
  renderStats();
}
function setStatus(id,v){ state[id].status=v; save(); renderBoard(); if(view==='cal')renderCal(); }
function setDate(id,v){ state[id].date=v; if(v && state[id].status==='apublier'){state[id].status='planifie';} save(); renderBoard(); if(view==='cal')renderCal(); }
function setHeure(id,v){ state[id].heure=v; save(); if(view==='cal')renderCal(); }

function openModal(id){
  const p=POSTS.find(x=>x.id===id), s=st(p), stt=STATUS[s.status], ty=TYPES[p.type], bl=bodyLen(p.cap);
  const mImg=document.getElementById("mImg");
  // En grand aussi, le visuel est montré en entier (contain sur fond navy) : le
  // client doit voir exactement ce qui sortira, pas une version recadrée.
  const fit = `${bg(p)};background-size:contain;background-repeat:no-repeat;background-position:center;background-color:#0A1F44;min-height:70vh`;
  mImg.style.cssText = p.img?fit:"background:#e9eff7";
  setH(mImg, p.img?"":"<div style='display:flex;height:100%;align-items:center;justify-content:center;color:#9aa2b1'>"+(p.phLabel||"Photo à lier")+"</div>");
  document.getElementById("mAngle").textContent = ty.icon+" "+ty.label+" #"+p.num+" · "+p.angle;
  setH(document.getElementById("mMeta"), `<span class="pill" style="position:static;background:${ty.color}">${ty.short}</span> <span class="pill" style="position:static;background:${stt.color}">${stt.label}</span> <span>${s.date||"non planifié"}${s.heure?" · "+s.heure:""}</span>`);
  document.getElementById("mCap").textContent = p.cap;
  setH(document.getElementById("mCC"), p.type==="post" ? `<b class="${bl<150||bl>400?'cc bad':'cc'}">${bl} car.</b> hors signature` : "");
  document.getElementById("mCopy").onclick=()=>copy(p.cap);
  document.getElementById("ov").classList.add("on");
}
function closeModal(){ document.getElementById("ov").classList.remove("on"); }

let cur = new Date(); cur.setDate(1);
const MONTHS=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const DOW=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
function moveMonth(d){ cur.setMonth(cur.getMonth()+d); renderCal(); }
function iso(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function chip(p,tray){
  const ty=TYPES[p.type];
  const im = p.img?`<img src="${p.img}">`:`<span class="ph2"></span>`;
  // La mention de format est portée par une pastille couleur + l'icône, pour identifier
  // le contenu d'un coup d'œil dans la grille du mois.
  const tag = `<span class="fmt" style="background:${ty.color}">${ty.icon} ${ty.short}</span>`;
  const meta = tray ? "" : (st(p).heure?" · "+st(p).heure:"");
  return `<div class="${tray?'tchip':'ev'}" draggable="true" data-id="${p.id}" title="${esc(ty.label+" #"+p.num+" — "+p.angle)}">${im}<span class="evtxt">${tag}<span>#${p.num}${meta}</span></span>${tray?'':`<span class="x" onclick="event.stopPropagation();unschedule('${p.id}')">✕</span>`}</div>`;
}
function renderTray(){
  const t=document.getElementById("tray");
  const un=POSTS.filter(p=>!st(p).date);
  setH(t, un.length? un.map(p=>chip(p,true)).join("") : "<span style='color:var(--muted);font-size:12.5px'>Tout est planifié 🎉</span>");
}
function renderCal(){
  document.getElementById("monthLabel").textContent = MONTHS[cur.getMonth()]+" "+cur.getFullYear();
  renderTray();
  const y=cur.getFullYear(), m=cur.getMonth();
  const first=new Date(y,m,1); let start=(first.getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate();
  const today=new Date(); const tIso=iso(today.getFullYear(),today.getMonth(),today.getDate());
  const g=document.getElementById("calGrid"); g.textContent="";
  DOW.forEach(d=>{const e=document.createElement("div");e.className="dow";e.textContent=d;g.appendChild(e);});
  for(let i=0;i<start;i++){const e=document.createElement("div");e.className="day out";g.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const dISO=iso(y,m,d);
    const cell=document.createElement("div"); cell.className="day"+(dISO===tIso?" today":"");
    cell.dataset.date=dISO;
    const evs=POSTS.filter(p=>st(p).date===dISO).map(p=>chip(p,false)).join("");
    setH(cell, `<div class="dn">${d}</div>${evs}`);
    g.appendChild(cell);
  }
  bindDrag();
}
let dragId=null;
function bindDrag(){
  document.querySelectorAll('[draggable=true]').forEach(el=>{
    el.ondragstart=e=>{dragId=el.dataset.id; e.dataTransfer.effectAllowed="move";};
  });
  document.querySelectorAll('.day[data-date]').forEach(cell=>{
    cell.ondragover=e=>{e.preventDefault();cell.classList.add('drop');};
    cell.ondragleave=()=>cell.classList.remove('drop');
    cell.ondrop=e=>{e.preventDefault();cell.classList.remove('drop'); if(dragId){schedule(dragId,cell.dataset.date);dragId=null;}};
  });
  const tray=document.getElementById("tray");
  tray.ondragover=e=>e.preventDefault();
  tray.ondrop=e=>{e.preventDefault(); if(dragId){unschedule(dragId);dragId=null;}};
}
function schedule(id,date){ state[id].date=date; if(state[id].status==='apublier')state[id].status='planifie'; save(); renderCal(); renderStats(); }
function unschedule(id){ state[id].date=""; if(state[id].status==='planifie')state[id].status='apublier'; save(); renderCal(); renderStats(); if(view==='board')renderBoard(); }

let view="board";
function setView(v){
  view=v;
  document.getElementById("board").classList.toggle("hidden",v!=="board");
  document.getElementById("cal").classList.toggle("hidden",v!=="cal");
  document.getElementById("vBoard").classList.toggle("on",v==="board");
  document.getElementById("vCal").classList.toggle("on",v==="cal");
  if(v==="cal"){ renderCal(); renderStats(); } else renderBoard();
}
// #cal dans l'URL ouvre directement la vue calendrier (lien partageable).
setView(location.hash === "#cal" ? "cal" : "board");
</script>
